# Branch Protection Rules

# Main branch - Production
- name: main
  protection:
    required_status_checks:
      strict: true
      contexts:
        - code-quality
        - unit-tests
        - integration-tests
        - security-scan
        - build
        - e2e-tests
    
    enforce_admins: true
    required_approving_review_count: 2
    require_code_owner_reviews: true
    dismiss_stale_reviews: true
    pull_request_reviews:
      - type: Approved
        dismiss_on_change: true
    
    restrictions:
      users: []
      teams:
        - engineering
        - leads
    
    force_push: false
    delete_branch: false

# Develop branch - Integration
- name: develop
  protection:
    required_status_checks:
      strict: false
      contexts:
        - code-quality
        - unit-tests
    
    enforce_admins: true
    required_approving_review_count: 1
    require_code_owner_reviews: false
    dismiss_stale_reviews: true
    
    force_push: false
    delete_branch: false

# Feature branches
- name: 'feature/*'
  protection:
    required_status_checks:
      strict: false
      contexts:
        - code-quality
        - unit-tests
    
    enforce_admins: false
    required_approving_review_count: 0
    require_code_owner_reviews: false
    
    force_push: true
    delete_branch: true

# Hotfix branches
- name: 'hotfix/*'
  protection:
    required_status_checks:
      strict: false
      contexts:
        - code-quality
        - unit-tests
    
    enforce_admins: true
    required_approving_review_count: 1
    
    force_push: false
    delete_branch: true

# Release branches
- name: 'release/*'
  protection:
    required_status_checks:
      strict: true
      contexts:
        - code-quality
        - unit-tests
        - integration-tests
        - security-scan
    
    enforce_admins: true
    required_approving_review_count: 1
    
    force_push: false
    delete_branch: false
