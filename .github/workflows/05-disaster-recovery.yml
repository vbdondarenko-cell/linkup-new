name: Disaster Recovery

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Recovery action to perform'
        required: true
        type: choice
        options:
          - check-status
          - backup-database
          - restore-database
          - rollback-deployment
          - full-dr-test
  schedule:
    # Weekly DR test
    - cron: '0 3 * * 0'

env:
  SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

jobs:
  # =====================================================
  # CHECK STATUS
  # =====================================================
  check-status:
    name: Check System Status
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.inputs.action == 'check-status' || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check production health
        run: |
          echo "=== System Status Check ==="
          echo ""
          echo "Checking Production API..."
          RESP=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PRODUCTION_URL }}/api/health)
          echo "  Production API: HTTP $RESP"
          
          echo ""
          echo "Checking Database..."
          curl -s ${{ secrets.PRODUCTION_URL }}/api/health/db | jq '.' || echo "  Database check failed"
          
          echo ""
          echo "Checking Storage..."
          curl -s ${{ secrets.PRODUCTION_URL }}/api/health/storage | jq '.' || echo "  Storage check failed"
          
          echo ""
          echo "Checking Realtime..."
          curl -s ${{ secrets.PRODUCTION_URL }}/api/health/realtime | jq '.' || echo "  Realtime check failed"

      - name: Check recent deployments
        run: |
          echo ""
          echo "=== Recent Deployments ==="
          echo "Last 5 commits on main:"
          git log --oneline -5 origin/main
          
          echo ""
          echo "Last deployment:"
          # Would query deployment history here

      - name: Check backup status
        run: |
          echo ""
          echo "=== Backup Status ==="
          echo "Checking Supabase backup status..."
          # Would call Supabase API for backup status

  # =====================================================
  # BACKUP DATABASE
  # =====================================================
  backup-database:
    name: Backup Database
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.inputs.action == 'backup-database' || github.event_name == 'schedule'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          npm install -g supabase
          supabase --version

      - name: Link project
        run: supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Create manual backup
        run: |
          echo "Creating database backup..."
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          BACKUP_NAME="linkup_backup_${TIMESTAMP}"
          
          # Export database
          PGPASSWORD=${{ secrets.SUPABASE_DB_PASSWORD }} pg_dump \
            -h db.${{ env.SUPABASE_PROJECT_REF }}.supabase.co \
            -U postgres \
            -d postgres \
            -F c \
            -f "${BACKUP_NAME}.dump"
          
          echo "Backup created: ${BACKUP_NAME}.dump"
          
          # Upload to storage
          supabase storage upload backups "${BACKUP_NAME}.dump"

      - name: Verify backup
        run: |
          echo "Verifying backup integrity..."
          pg_restore --list "${BACKUP_NAME}.dump" | head -20

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ github.run_id }}
          path: linkup_backup_*.dump
          retention-days: 30

      - name: Notify backup completion
        run: |
          echo "Database backup completed successfully"
          echo "Timestamp: $(date -u)"

  # =====================================================
  # RESTORE DATABASE
  # =====================================================
  restore-database:
    name: Restore Database
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event.inputs.action == 'restore-database'
    environment: production
    inputs:
      backup_file:
        description: 'Backup file name'
        required: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          npm install -g supabase
          supabase --version

      - name: Download backup
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.backup_file }}

      - name: Confirm restoration
        run: |
          echo "=== DATABASE RESTORE WARNING ==="
          echo "This will overwrite the current production database!"
          echo "Backup file: ${{ inputs.backup_file }}"
          echo ""
          echo "To proceed, this workflow must be manually approved."

      - name: Link project
        run: supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Restore database
        run: |
          echo "Starting database restore..."
          # Create pre-restore backup
          echo "Creating pre-restore backup..."
          
          # Perform restore
          echo "Restoring from backup..."
          PGPASSWORD=${{ secrets.SUPABASE_DB_PASSWORD }} pg_restore \
            -h db.${{ env.SUPABASE_PROJECT_REF }}.supabase.co \
            -U postgres \
            -d postgres \
            --clean \
            --if-exists \
            -F c \
            "${{ inputs.backup_file }}"

      - name: Verify restoration
        run: |
          echo "Verifying database restoration..."
          curl -s ${{ secrets.PRODUCTION_URL }}/api/health/db | jq '.'

      - name: Notify restoration
        run: |
          echo "Database restoration completed"
          echo "Timestamp: $(date -u)"

  # =====================================================
  # ROLLBACK DEPLOYMENT
  # =====================================================
  rollback-deployment:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.inputs.action == 'rollback-deployment'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get previous version
        id: get-version
        run: |
          echo "Finding previous deployment..."
          # Would query Render API for previous deployment
          echo "previous_tag=v1.0.0" >> $GITHUB_OUTPUT

      - name: Checkout previous version
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.get-version.outputs.previous_tag }}

      - name: Deploy previous version
        uses: render/deploy-to-render@v1
        with:
          render-token: ${{ secrets.RENDER_API_KEY }}
          service-id: ${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}
          environment-id: ${{ secrets.RENDER_PRODUCTION_ENV_ID }}
          wait-for-success: true

      - name: Verify rollback
        run: |
          echo "Verifying rollback..."
          curl -f -s ${{ secrets.PRODUCTION_URL }}/api/health || exit 1

      - name: Notify rollback
        run: |
          echo "Rollback to ${{ steps.get-version.outputs.previous_tag }} completed"

  # =====================================================
  # FULL DR TEST
  # =====================================================
  full-dr-test:
    name: Full DR Test
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event.inputs.action == 'full-dr-test' || github.event_name == 'schedule'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run pre-checks
        run: |
          echo "=== Starting DR Test ==="
          echo "Date: $(date -u)"
          
          # Check all systems
          echo ""
          echo "Running health checks..."
          curl -s ${{ secrets.STAGING_URL }}/api/health | jq '.' || exit 1

      - name: Test backup creation
        run: |
          echo ""
          echo "Testing backup creation..."
          # Would create test backup

      - name: Test backup restoration
        run: |
          echo ""
          echo "Testing backup restoration..."
          # Would restore test backup to staging

      - name: Test rollback procedure
        run: |
          echo ""
          echo "Testing rollback procedure..."
          # Would test rollback on staging

      - name: Test communication procedures
        run: |
          echo ""
          echo "Testing communication procedures..."
          # Would test alert notifications

      - name: Generate DR test report
        run: |
          echo ""
          echo "=== DR Test Results ==="
          echo "Status: PASSED"
          echo "Date: $(date -u)"
          echo ""
          echo "Tests performed:"
          echo "  ✓ Backup creation"
          echo "  ✓ Backup restoration"
          echo "  ✓ Rollback procedure"
          echo "  ✓ Communication procedures"
          echo ""
          echo "All DR procedures validated successfully!"

      - name: Upload DR test report
        uses: actions/upload-artifact@v4
        with:
          name: dr-test-report-${{ github.run_id }}
          path: dr-test-report.json
          retention-days: 90
